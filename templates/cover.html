<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background-color: #FAF6F1;
    font-family: 'Noto Sans KR', sans-serif;
    color: #2D2D2D;
    display: flex;
    flex-direction: column;
    padding: 72px 88px;
    overflow: hidden;
  }
  .header {
    margin-bottom: auto;
  }
  .label-pill {
    display: inline-block;
    background-color: #2D2D2D;
    color: #FAF6F1;
    font-size: 13px;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 100px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 24px;
  }
  .eyebrow {
    font-size: 15px;
    font-weight: 700;
    color: #D4734A;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .title {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.03em;
    word-break: keep-all;
    margin-bottom: 28px;
    color: #2D2D2D;
  }
  .title .accent { color: #D4734A; }
  .subtitle {
    font-size: 28px;
    font-weight: 400;
    color: rgba(45,45,45,0.52);
    line-height: 1.55;
    word-break: keep-all;
    max-width: 700px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .date {
    font-size: 15px;
    color: rgba(45,45,45,0.32);
    letter-spacing: 0.04em;
  }
  .brand {
    font-size: 13px;
    font-weight: 700;
    color: rgba(45,45,45,0.22);
    letter-spacing: 0.22em;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="label-pill">ANTHROPIC NEWS</div>
  </div>
  <div class="center">
    <div class="eyebrow">NEW RELEASE</div>
    <div class="title">{{ title_html }}</div>
    <div class="subtitle">{{ subtitle }}</div>
  </div>
  <div class="footer">
    <div class="date">{{ date }}</div>
    <div class="brand">ANTHROPIC</div>
  </div>
</body>
</html>
