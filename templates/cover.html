<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background-color: #141414;
    font-family: 'Noto Sans KR', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }
  .geo-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(212,169,122,0.10);
  }
  .geo-dot {
    position: absolute;
    border-radius: 50%;
    background-color: #D4A97A;
  }
  .geo-line {
    position: absolute;
    background-color: rgba(212,169,122,0.07);
  }
  .content {
    position: absolute;
    inset: 0;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .label-pill {
    background-color: #D4A97A;
    color: #141414;
    font-size: 17px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 100px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .slide-num {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.15em;
  }
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 220px;
  }
  .title {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -0.025em;
    word-break: keep-all;
    margin-bottom: 32px;
  }
  .title .accent { color: #D4A97A; }
  .subtitle {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.42);
    line-height: 1.6;
    word-break: keep-all;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .date {
    font-size: 17px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.05em;
  }
  .brand {
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.16);
    letter-spacing: 0.18em;
  }
</style>
</head>
<body>
  <!-- Geometric decoration (right side) -->
  <div class="geo-ring" style="width:580px;height:580px;right:-240px;top:-240px;"></div>
  <div class="geo-ring" style="width:360px;height:360px;right:-120px;top:-120px;border-color:rgba(212,169,122,0.06);"></div>
  <div class="geo-ring" style="width:160px;height:160px;right:60px;top:60px;border-color:rgba(212,169,122,0.15);"></div>
  <div class="geo-dot" style="width:10px;height:10px;right:152px;top:318px;opacity:0.48;"></div>
  <div class="geo-dot" style="width:6px;height:6px;right:90px;top:462px;opacity:0.28;"></div>
  <div class="geo-dot" style="width:14px;height:14px;right:268px;top:184px;opacity:0.18;"></div>
  <div class="geo-line" style="width:1px;height:180px;right:204px;top:360px;"></div>

  <div class="content">
    <div class="header">
      <div class="label-pill">ANTHROPIC NEWS</div>
      <div class="slide-num">01</div>
    </div>
    <div class="center">
      <div class="title">{{ title_html }}</div>
      <div class="subtitle">{{ subtitle }}</div>
    </div>
    <div class="footer">
      <div class="date">{{ date }}</div>
      <div class="brand">ANTHROPIC</div>
    </div>
  </div>
</body>
</html>
