<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background-color: #FAF6F1;
    font-family: 'Noto Sans KR', sans-serif;
    color: #2D2D2D;
    display: flex;
    flex-direction: column;
    padding: 72px 88px;
    overflow: hidden;
  }
  .header { margin-bottom: auto; }
  .label-pill {
    display: inline-block;
    background-color: #2D2D2D;
    color: #FAF6F1;
    font-size: 13px;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 100px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 16px;
  }
  .cta-text {
    font-size: 60px;
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -0.025em;
    word-break: keep-all;
    margin-bottom: 48px;
    max-width: 800px;
  }
  .follow-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background-color: #2D2D2D;
    color: #FAF6F1;
    font-size: 20px;
    font-weight: 700;
    padding: 18px 44px;
    border-radius: 100px;
    letter-spacing: 0.03em;
    align-self: flex-start;
  }
  .bottom-bar {
    border-top: 1px solid rgba(45,45,45,0.1);
    padding-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .url-label {
    font-size: 11px;
    color: rgba(45,45,45,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .url-text {
    font-size: 14px;
    color: rgba(45,45,45,0.42);
    word-break: break-all;
    max-width: 820px;
  }
  .brand {
    font-size: 13px;
    font-weight: 700;
    color: rgba(45,45,45,0.2);
    letter-spacing: 0.22em;
    flex-shrink: 0;
    margin-left: 24px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="label-pill">FOLLOW US</div>
  </div>
  <div class="center">
    <div class="cta-text">{{ cta_text }}</div>
    <div class="follow-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 10H16M16 10L10 4M16 10L10 16" stroke="#FAF6F1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      팔로우하기
    </div>
  </div>
  <div class="bottom-bar">
    <div>
      <div class="url-label">원본 기사 보기</div>
      <div class="url-text">{{ original_url }}</div>
    </div>
    <div class="brand">ANTHROPIC</div>
  </div>
</body>
</html>
