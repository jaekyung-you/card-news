<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background-color: #191919;
    font-family: 'Noto Sans KR', sans-serif;
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px;
    overflow: hidden;
  }
  .label {
    font-size: 22px;
    font-weight: 700;
    color: #D4A97A;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
  }
  .cta-text {
    font-size: 52px;
    font-weight: 900;
    line-height: 1.3;
    letter-spacing: -0.02em;
    word-break: keep-all;
    margin-bottom: 56px;
  }
  .cta-text .highlight {
    color: #D4A97A;
  }
  .follow-btn {
    display: inline-block;
    background-color: #D4A97A;
    color: #191919;
    font-size: 22px;
    font-weight: 700;
    padding: 18px 48px;
    border-radius: 100px;
    letter-spacing: 0.04em;
  }
  .footer {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .original-label {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
    letter-spacing: 0.04em;
  }
  .original-url {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    word-break: break-all;
  }
</style>
</head>
<body>
  <div class="label">Anthropic News</div>
  <div class="center">
    <div class="cta-text">{{ cta_text }}</div>
    <div class="follow-btn">팔로우하기 →</div>
  </div>
  <div class="footer">
    <div class="original-label">원본 보기</div>
    <div class="original-url">{{ original_url }}</div>
  </div>
</body>
</html>
