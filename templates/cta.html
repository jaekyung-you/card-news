<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background-color: #141414;
    font-family: 'Noto Sans KR', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }
  .bg-text {
    position: absolute;
    bottom: 110px;
    left: -10px;
    font-size: 300px;
    font-weight: 900;
    color: rgba(255,255,255,0.022);
    letter-spacing: -0.05em;
    line-height: 1;
    user-select: none;
    white-space: nowrap;
  }
  .geo-ring {
    position: absolute;
    border-radius: 50%;
  }
  .content {
    position: absolute;
    inset: 0;
    padding: 72px 80px 0;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .label-pill {
    background-color: #D4A97A;
    color: #141414;
    font-size: 17px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 100px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .slide-num {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.15em;
  }
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 32px;
  }
  .cta-text {
    font-size: 58px;
    font-weight: 900;
    line-height: 1.25;
    letter-spacing: -0.025em;
    word-break: keep-all;
    margin-bottom: 48px;
  }
  .follow-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background-color: #D4A97A;
    color: #141414;
    font-size: 21px;
    font-weight: 700;
    padding: 18px 44px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    align-self: flex-start;
  }
  .bottom-bar {
    background-color: #1a1a1a;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 26px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .url-label {
    font-size: 12px;
    color: rgba(255,255,255,0.26);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .url-text {
    font-size: 15px;
    color: rgba(255,255,255,0.42);
    word-break: break-all;
    max-width: 820px;
  }
  .brand {
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.14);
    letter-spacing: 0.2em;
    flex-shrink: 0;
    margin-left: 24px;
  }
</style>
</head>
<body>
  <div class="bg-text">FOLLOW</div>
  <div class="geo-ring" style="width:380px;height:380px;right:-150px;top:220px;border:1px solid rgba(212,169,122,0.07);"></div>
  <div class="geo-ring" style="width:200px;height:200px;right:-50px;top:320px;border:1px solid rgba(212,169,122,0.12);"></div>

  <div class="content">
    <div class="header">
      <div class="label-pill">FOLLOW US</div>
      <div class="slide-num">{{ '%02d' % slide_number }}</div>
    </div>
    <div class="center">
      <div class="cta-text">{{ cta_text }}</div>
      <div class="follow-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10H16M16 10L10 4M16 10L10 16" stroke="#141414" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        팔로우하기
      </div>
    </div>
    <div class="bottom-bar">
      <div>
        <div class="url-label">원본 기사 보기</div>
        <div class="url-text">{{ original_url }}</div>
      </div>
      <div class="brand">ANTHROPIC</div>
    </div>
  </div>
</body>
</html>
